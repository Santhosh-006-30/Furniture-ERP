name: CI/CD — Shiv Furniture Works ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Code Quality ──────────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/test.db

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint (if configured)
        run: npx eslint src --ext .ts,.tsx --max-warnings 0 || true

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality

    env:
      DATABASE_URL: file:./prisma/ci.db
      JWT_SECRET: ci_test_secret_32_chars_minimum_xx
      NEXTAUTH_SECRET: ci_test_nextauth_secret_32_chars_xx
      NEXTAUTH_URL: http://localhost:3000
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: '587'
      EMAIL_USER: test@example.com
      EMAIL_PASSWORD: test_password
      RAZORPAY_KEY_ID: rzp_test_xxx
      RAZORPAY_KEY_SECRET: test_secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            !.next/cache
          retention-days: 7

  # ─── Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  # ─── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://erp.shivfurniture.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/shiv-erp
            git pull origin main
            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            node scripts/backup-db.cjs
            pm2 restart shiv-erp || pm2 start ecosystem.config.js
            echo "Deployment complete: $(date)"
